<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velocidade da Lux 2.0 — Telão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ================================================================
       VARIÁVEIS DA MARCA LUX
    ================================================================ */
    :root {
      --azul-1: #0B2A3D;
      --azul-2: #1F4E6B;
      --azul-3: #2F6F8F;
      --azul-4: #4F7F99;
      --verde-1: #0F3834;
      --verde-2: #4E7D5B;
      --verde-3: #8BC34A;
      --neutro-1: #E6ECEF;
      --neutro-2: #FBFFEF;
      --branco: #FFFFFF;
      --cinza: #6B7C88;

      /* Glass system */
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-bg-hover: rgba(255, 255, 255, 0.11);
      --glass-border: rgba(255, 255, 255, 0.13);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.08);
      --glass-green: rgba(139, 195, 74, 0.14);
      --glass-green-border: rgba(139, 195, 74, 0.28);
      --glass-gold: rgba(255, 200, 0, 0.10);
      --glass-gold-border: rgba(255, 200, 0, 0.22);
    }

    /* ================================================================
       RESET & BASE
    ================================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      /* Cor da moldura física das TVs — aparece nas junções */
      background: #060f18;
      color: white;
      -webkit-font-smoothing: antialiased;
    }

    /* ================================================================
       GRID PRINCIPAL — 4 TVs em 2×2
       O gap simula as molduras físicas das televisões se encontrando.
       O background escuro do body aparece nas junções como "bezel".
    ================================================================ */
    #dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px;           /* espessura da junção entre as TVs */
      width: 100vw;
      height: 100vh;
      position: relative;
      padding: 0;          /* TVs vão até a borda — sem margem externa */
    }

    

    /* ================================================================
       QUADRANTES — cada um é uma TV independente
    ================================================================ */
    .quadrant {
      /* Sem width/height fixo — o grid 1fr×1fr cuida disso */
      padding: 14px 16px 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: relative;
      /* Fundo de cada "tela" com gradiente da Lux */
      background: linear-gradient(145deg, #0d2235 0%, #182f45 55%, #0d2820 100%);
      /* Bordas arredondadas simulam o leve chanfro das telas modernas */
      border-radius: 3px;
      /* Sombra interna simula profundidade de tela + brilho de borda */
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.07),
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 0 40px rgba(0,0,0,0.6);
    }

    /* ================================================================
       GLASS — COMPONENTE BASE
    ================================================================ */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      box-shadow: var(--glass-shadow);
    }

    .glass-green {
      background: var(--glass-green);
      border-color: var(--glass-green-border);
    }

    .glass-gold {
      background: var(--glass-gold);
      border-color: var(--glass-gold-border);
    }

    /* ================================================================
       CABEÇALHO DE QUADRANTE
    ================================================================ */
    .quad-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      padding-bottom: 4px;
    }

    .quad-header h2 {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }

    .live-badge {
      font-size: 12px;
      font-weight: 700;
      color: var(--verde-3);
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--verde-3);
      animation: pulseDot 2s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ================================================================
       Q1 — RANKING GERAL
    ================================================================ */
    .ranking-container {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .ranking-divider {
      background: rgba(255,255,255,0.08);
      align-self: stretch;
    }

    .ranking-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      overflow: hidden;
    }

    .ranking-panel-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      flex-shrink: 0;
    }

    .ranking-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      overflow: hidden;
      flex: 1;
    }

    /* Linha de pessoa no ranking */
    .pessoa-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 7px;
      border-radius: 8px;
      flex-shrink: 0;
      transition: all 0.4s ease;
      animation: rowEntrada 0.4s ease forwards;
    }

    @keyframes rowEntrada {
      from { opacity: 0; transform: translateX(-8px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .pessoa-row.ouro   { background: var(--glass-gold);  border: 1px solid var(--glass-gold-border); }
    .pessoa-row.prata  { background: rgba(192,192,192,0.08); border: 1px solid rgba(192,192,192,0.18); }
    .pessoa-row.bronze { background: rgba(205,127,50,0.08); border: 1px solid rgba(205,127,50,0.18); }
    .pessoa-row.normal { background: var(--glass-bg); border: 1px solid var(--glass-border); }
    .pessoa-row.destaque-exec { background: var(--glass-gold); border: 1px solid var(--glass-gold-border); }

    .medal-badge { font-size: 18px; flex-shrink: 0; width: 20px; text-align: center; }
    .pos-num { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35); width: 16px; text-align: center; flex-shrink: 0; }

    /* Avatar */
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--azul-3), var(--azul-4));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.15);
    }

    .avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* Informações da pessoa */
    .pessoa-info { flex: 1; min-width: 0; }

    .pessoa-nome {
      font-size: 13px;
      font-weight: 600;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pessoa-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      margin-top: 1px;
      white-space: nowrap;
    }

    /* Barra de progresso */
    .progress-wrap {
      width: 45px;
      flex-shrink: 0;
    }

    .progress-track {
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--azul-4), var(--verde-3));
      transition: width 1s ease;
    }

    /* Métrica principal */
    .pessoa-valor {
      font-size: 14px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      min-width: 28px;
      text-align: right;
    }

    /* Indicador de ultrapassagem */
    .up-badge {
      font-size: 10px;
      font-weight: 700;
      color: var(--verde-3);
      background: rgba(139,195,74,0.18);
      border: 1px solid rgba(139,195,74,0.3);
      padding: 2px 5px;
      border-radius: 4px;
      flex-shrink: 0;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ================================================================
       Q2 — FUNIL & FECHAMENTOS
    ================================================================ */
    .q2-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .chart-area {
      flex: 1;
      display: flex;
      gap: 10px;
      min-height: 0;
    }

    .chart-box {
      flex: 1;
      padding: 10px 12px 8px;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .chart-box-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      flex-shrink: 0;
      margin-bottom: 8px;
    }

    .chart-box canvas {
      flex: 1;
      min-height: 0;
    }

    /* Legenda do gráfico */
    .chart-legenda {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      margin-top: 4px;
      flex-wrap: wrap;
    }

    .legenda-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      font-weight: 500;
    }

    .legenda-dot {
      width: 8px;
      height: 3px;
      border-radius: 2px;
    }

    /* Fechamentos recentes */
    .fechamentos-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      flex-shrink: 0;
    }

    .fechamentos-list {
      display: flex;
      gap: 8px;
      flex: 1;
      min-height: 0;
    }

    .fechamento-card {
      flex: 1;
      padding: 10px 12px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
      justify-content: center;
    }

    .fech-cliente {
      font-size: 14px;
      font-weight: 700;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fech-local {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }

    .fech-valor {
      font-size: 17px;
      font-weight: 800;
      color: var(--verde-3);
      margin-top: 2px;
    }

    .fech-unidades {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
    }

    .fech-exec {
      font-size: 11px;
      color: var(--azul-4);
      font-weight: 600;
      margin-top: 2px;
    }

    .fech-edn {
      font-size: 11px;
      color: var(--verde-3);
      font-weight: 500;
    }

    /* ================================================================
       Q3 — DESTAQUES + FECHAMENTOS
    ================================================================ */
    .q3-body {
      flex: 1;
      min-height: 0;           /* impede overflow no flexbox pai */
      display: grid;
      grid-template-rows: 38fr 1px 62fr;  /* ~38% destaques (3 linhas) / ~62% fechamentos */
      gap: 6px;
      overflow: hidden;
    }

    .destaques-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
    }

    .fechamentos-q3 {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
      overflow: hidden;
    }

    /* Destaque: linha horizontal — ícone | categoria | avatar | nome | valor */
    .destaque-row {
      flex: 1;
      min-height: 0;
      padding: 10px 13px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .dest-icone {
      font-size: 26px;
      flex-shrink: 0;
      line-height: 1;
    }

    .dest-categoria {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      width: 100px;
      flex-shrink: 0;
    }

    .dest-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--azul-3), var(--azul-4));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: white;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.18);
      flex-shrink: 0;
    }

    .dest-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .dest-nome {
      font-size: 15px;
      font-weight: 700;
      color: white;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dest-valor {
      font-size: 20px;
      font-weight: 800;
      color: var(--verde-3);
      line-height: 1;
      flex-shrink: 0;
    }

    .dest-label {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      font-weight: 500;
      flex-shrink: 0;
    }

    /* Separador entre destaques e fechamentos em Q3 */
    .q3-divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      flex-shrink: 0;
    }



    /* ================================================================
       Q4 — META DO MÊS
    ================================================================ */
    .metas-container {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 10px;
      flex: 1;
      min-height: 0;
    }

    .meta-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      overflow: hidden;
    }

    .meta-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 12px;
      flex-shrink: 0;
      transition: all 0.4s ease;
      min-height: 60px;
    }

    .meta-row.batida {
      background: var(--glass-green);
      border: 1px solid var(--glass-green-border);
    }

    .meta-row.nao-batida {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
    }

    .meta-valor-grande {
      font-size: 36px;
      font-weight: 800;
      color: var(--verde-3);
      text-align: center;
    }

    .meta-info { flex: 1; min-width: 0; }

    .meta-nome {
      font-size: 13px;
      font-weight: 600;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta-progresso-track {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 3px;
    }

    .meta-progresso-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s ease;
    }

    .meta-progresso-fill.ok    { background: linear-gradient(90deg, var(--verde-2), var(--verde-3)); }
    .meta-progresso-fill.parcial { background: linear-gradient(90deg, var(--azul-3), var(--azul-4)); }

    .meta-contagem {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.7);
      flex-shrink: 0;
      min-width: 32px;
      text-align: right;
    }

    .meta-check {
      font-size: 14px;
      flex-shrink: 0;
      animation: checkPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes checkPop {
      0%   { transform: scale(0) rotate(-20deg); }
      70%  { transform: scale(1.25) rotate(5deg); }
      100% { transform: scale(1) rotate(0); }
    }

    .meta-rodape {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      font-weight: 500;
      flex-shrink: 0;
      padding: 3px 2px 0;
    }

    /* ================================================================
       Q4 — LINHAS INDIVIDUAIS POR PESSOA
    ================================================================ */
    .meta-pessoa-row {
      display: flex;
      align-items: center;
      padding: 5px 8px;
      border-radius: 7px;
      flex-shrink: 0;
    }

    .meta-pessoa-row.batida     { background: var(--glass-green); border: 1px solid var(--glass-green-border); }
    .meta-pessoa-row.nao-batida { background: var(--glass-bg);    border: 1px solid var(--glass-border); }

    .meta-pessoa-info { flex: 1; min-width: 0; }

    .meta-pessoa-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .meta-pessoa-nome {
      font-size: 11px;
      font-weight: 600;
      color: white;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta-pessoa-contagem {
      font-size: 12px;
      font-weight: 800;
      color: var(--verde-3);
      flex-shrink: 0;
      white-space: nowrap;
    }

    .meta-pessoa-contagem .meta-sep  { color: rgba(255,255,255,0.25); font-weight: 400; }
    .meta-pessoa-contagem .meta-goal { color: rgba(255,255,255,0.4);  font-weight: 600; font-size: 11px; }

    .meta-mini-track {
      height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      margin-top: 4px;
    }

    .meta-mini-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.8s ease;
    }

    .meta-mini-fill.ok      { background: linear-gradient(90deg, var(--verde-2), var(--verde-3)); }
    .meta-mini-fill.parcial { background: linear-gradient(90deg, var(--azul-3), var(--azul-4)); }

    /* ================================================================
       EMPTY STATE
    ================================================================ */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 6px;
      color: rgba(255,255,255,0.25);
      font-size: 11px;
      text-align: center;
    }

    .empty-state .empty-icon { font-size: 22px; opacity: 0.4; }
  </style>
</head>
<body>

<div id="dashboard">

  <!-- =====================================================
       Q1 — RANKING GERAL AO VIVO  (superior esquerdo)
  ====================================================== -->
  <section class="quadrant" id="q1">
    <div class="quad-header">
      <h2>Ranking Geral ao Vivo</h2>
      <span class="live-badge"><span class="live-dot"></span>AO VIVO</span>
    </div>
    <div class="ranking-container">
      <!-- EDNs -->
      <div class="ranking-panel">
        <div class="ranking-panel-title">EDNs — Reuniões Realizadas</div>
        <div class="ranking-list" id="ranking-edns"></div>
      </div>
      <div class="ranking-divider"></div>
      <!-- Executivos -->
      <div class="ranking-panel">
        <div class="ranking-panel-title">Executivos — Receita</div>
        <div class="ranking-list" id="ranking-execs"></div>
      </div>
    </div>
  </section>

  <!-- =====================================================
       Q2 — FUNIL & FECHAMENTOS  (superior direito)
  ====================================================== -->
  <section class="quadrant" id="q2">
    <div class="quad-header">
      <h2>Funil de Vendas — Comparativo</h2>
    </div>
    <div class="q2-body">
      <!-- Gráficos comparativos -->
      <div class="chart-area">
        <div class="chart-box glass" id="chart-box-reunioes">
          <div class="chart-box-title">Reuniões Realizadas</div>
          <canvas id="chart-reunioes"></canvas>
          <div class="chart-legenda" id="legenda-reunioes"></div>
        </div>
        <div class="chart-box glass" id="chart-box-fechamentos">
          <div class="chart-box-title">Fechamentos</div>
          <canvas id="chart-fechamentos"></canvas>
          <div class="chart-legenda" id="legenda-fechamentos"></div>
        </div>
      </div>
      <!-- fechamentos movidos para Q3 -->
    </div>
  </section>

  <!-- =====================================================
       Q3 — DESTAQUES DO MÊS ANTERIOR  (inferior esquerdo)
  ====================================================== -->
  <section class="quadrant" id="q3">
    <div class="quad-header">
      <h2 id="destaques-titulo">Destaques do Mês Anterior</h2>
    </div>
    <div class="q3-body">
      <div class="destaques-container" id="destaques-container"></div>
      <div class="q3-divider"></div>
      <div class="fechamentos-q3">
        <div class="section-title" style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          Últimos Fechamentos do Mês
          <span id="fech-totais-badge" style="font-size:12px;font-weight:700;color:var(--verde-3);letter-spacing:0.05em;white-space:nowrap;"></span>
        </div>
        <div class="fechamentos-list" id="lista-fechamentos"></div>
      </div>
    </div>
  </section>

  <!-- =====================================================
       Q4 — META DO MÊS  (inferior direito)
  ====================================================== -->
  <section class="quadrant" id="q4">
    <div class="quad-header">
      <h2>Meta do Mês</h2>
    </div>
    <div class="metas-container">
      <div class="meta-panel">
        <div class="ranking-panel-title">EDNs — Reuniões</div>

  _fetchGist() {
    const token = this._getToken();

      headers: {
        'Accept': 'application/vnd.github+json',
        ...(token ? { 'Authorization': `token ${token}` } : {}),
      },
      cache: 'no-store',
    })
    .then(r => r.ok ? r.json() : Promise.reject('HTTP ' + r.status))
    .then(gist => {
      const raw = gist?.files?.['lux_data.json']?.content;
      if (raw) this._applyGist(JSON.parse(raw));
    });

/* ====================================================================

==================================================================== */
const Utils = {
  /* Gera iniciais a partir do nome completo */
  iniciais(nomeCompleto) {
    const partes = nomeCompleto.trim().split(' ').filter(Boolean);
    if (!partes.length) return '?';
    if (partes.length === 1) return partes[0][0].toUpperCase();
    return (partes[0][0] + partes[partes.length - 1][0]).toUpperCase();
  },

  /* Formata valor monetário em R$ */
  formataMoeda(valor) {
    return new Intl.NumberFormat('pt-BR', {
      style: 'currency', currency: 'BRL',
      minimumFractionDigits: 0, maximumFractionDigits: 0
    }).format(valor);
  },

  /* Retorna mês atual 0-based */
  mesAtual() { return new Date().getMonth(); },

  /* Nomes curtos dos meses */
  MESES: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],

  /* Gera ID único */
  uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); },

  /* Mês por extenso */
  mesExtenso(m) {
    const nomes = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                   'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    return nomes[m] || '';
  },

  /* Cria elemento HTML de avatar */
  criaAvatar(vendedor, tamanho = 30) {
    const el = document.createElement('div');
    el.className = 'avatar';
    el.style.width = el.style.height = tamanho + 'px';
    el.style.fontSize = Math.round(tamanho * 0.35) + 'px';
    if (vendedor && vendedor.foto) {
      const img = document.createElement('img');
      img.src = vendedor.foto;
      img.onerror = () => { el.textContent = Utils.iniciais(`${vendedor.nome} ${vendedor.sobrenome}`); };
      el.appendChild(img);
    } else if (vendedor) {
      el.textContent = Utils.iniciais(`${vendedor.nome} ${vendedor.sobrenome}`);
    } else {
      el.textContent = '?';
    }
    return el;
  },
};

  calcularEstatisticas() {
    const vendedores = DataService.getVendedores();
    const eventos = DataService.getEventos();

    const stats = {};
    vendedores.forEach(v => {
      stats[v.id] = {
        vendedor: v,
        pontos: 0,
        prospeccoes: 0,
        reunioesAgendadas: 0,
        reunioesRealizadas: 0,
        fechamentos: 0,
        totalReceita: 0,
        ultimoFechamento: null,
        participouFechamento: false,
      };
    });

    eventos.forEach(e => {
      if (!stats[e.vendedorId]) return;
      const s = stats[e.vendedorId];
      s.pontos += (this.PONTOS[e.tipo] || 0);

      if (e.tipo === 'prospeccao')          s.prospeccoes++;
      if (e.tipo === 'reuniao_agendada')    s.reunioesAgendadas++;
      if (e.tipo === 'reuniao_realizada')   s.reunioesRealizadas++;
      if (e.tipo === 'fechamento') {
        s.fechamentos++;
        s.totalReceita += (e.valorGestao || 0);
        s.pontos += this.bonusReceita(e.valorGestao || 0);
        if (!s.ultimoFechamento || e.data > s.ultimoFechamento.data)
          s.ultimoFechamento = e;
        // marca o EDN prospector como participante de fechamento
        if (e.ednId && stats[e.ednId]) stats[e.ednId].participouFechamento = true;
        s.participouFechamento = true;
      }
    });

    return Object.values(stats);
  },

  /* Ranking de EDNs por reuniões realizadas
     Desempate: participou de fechamento (fechou ou prospectou) > alfabético */
  rankingEDNs() {
    return this.calcularEstatisticas()
      .filter(s => s.vendedor.perfil === 'EDN' || s.vendedor.perfil === 'Ambos')
      .sort((a, b) => {
        if (b.reunioesRealizadas !== a.reunioesRealizadas) return b.reunioesRealizadas - a.reunioesRealizadas;
        const af = a.participouFechamento ? 1 : 0, bf = b.participouFechamento ? 1 : 0;
        if (bf !== af) return bf - af;
        return (a.vendedor.nome + a.vendedor.sobrenome).localeCompare(b.vendedor.nome + b.vendedor.sobrenome);
      });
  },

  /* Ranking de Executivos por receita gerada
     Desempate: fechamentos > alfabético */
  rankingExecutivos() {
    return this.calcularEstatisticas()
      .filter(s => (s.vendedor.perfil === 'Executivo' || s.vendedor.perfil === 'Ambos') && !s.vendedor.ocultarTelao)
      .sort((a, b) => {
        if (b.totalReceita !== a.totalReceita) return b.totalReceita - a.totalReceita;
        if (b.fechamentos !== a.fechamentos)   return b.fechamentos - a.fechamentos;
        return (a.vendedor.nome + a.vendedor.sobrenome).localeCompare(b.vendedor.nome + b.vendedor.sobrenome);
      });
  },

  /* Últimos N fechamentos do mês corrente */
  ultimosFechamentosMes(n = 3) {
    const mesAtual = new Date().toISOString().slice(0, 7); // 'YYYY-MM'
    return DataService.getFechamentos()
      .filter(e => e.data && e.data.startsWith(mesAtual))
      .sort((a, b) => b.data.localeCompare(a.data))
      .slice(0, n);
  },

  /* Dados mensais do ano passado e deste ano para o gráfico */
  dadosGrafico() {
    const hist    = DataService.getHistorico2025();
    const hist26  = DataService.getHistorico2026();
    const eventos = DataService.getEventos();
    const metas   = DataService.getMetas();
    const mesAtual = Utils.mesAtual(); // 0-based

    /* Contagem ao vivo de 2026 a partir dos eventos */
    const reunioes2026_live    = Array(12).fill(0);
    const fechamentos2026_live = Array(12).fill(0);

    eventos.forEach(e => {
      if (!e.data || !e.data.startsWith('2026-')) return;
      const mes = parseInt(e.data.split('-')[1]) - 1;
      if (e.tipo === 'reuniao_realizada') reunioes2026_live[mes]++;
      if (e.tipo === 'fechamento')        fechamentos2026_live[mes]++;
    });

    /* Reuniões blended: meses passados usam dados reais estáticos;
       mês atual usa a contagem ao vivo dos eventos.                */
    const reunioes2026 = reunioes2026_live.map((live, m) => {

      if (m > mesAtual) return null;
      if (m < mesAtual) return (hist26.reunioes[m] > 0 ? hist26.reunioes[m] : live);
      return live; // mês atual: sempre ao vivo
    });

    /* Fechamentos blended: meses passados usam override estático quando disponível;
       mês atual e futuros usam sempre a contagem ao vivo dos eventos.           */
    const fechamentos2026 = fechamentos2026_live.map((live, m) => {

      if (m > mesAtual) return null;
      if (m < mesAtual) return (hist26.fechamentos[m] > 0 ? hist26.fechamentos[m] : live);
      return Math.max(live, hist26.fechamentos[m] || 0); // mês atual: usa o maior entre live e override
    });

    /* Projeção de reuniões: Meta/EDN × Quantidade de EDNs (fixo, não linear) */
    const countEdns = DataService.getVendedores().filter(v => v.perfil === 'EDN' || v.perfil === 'Ambos').length;
    const metaReunPorEdn = metas.reunioesPorEDN || 12;
    const projReunTotal = countEdns * metaReunPorEdn;
    const projReun = Array(12).fill(0).map((_, i) => i <= mesAtual ? reunioes2026[i] : projReunTotal);

    /* Projeção de fechamentos: 20% das reuniões realizadas 2 meses antes
       Ex.: projeção de Abril = 20% das reuniões de Fevereiro
       Para Jan/Fev 2026 usa o histórico de Nov/Dez 2025 como base. */
    const projFech = Array(12).fill(0).map((_, m) => {
      if (m < 2) return 0; // Janeiro e Fevereiro: sem projeção
      const reun = reunioes2026[m - 2] || 0; // reuniões realizadas 2 meses antes (dentro de 2026)
      return reun > 0 ? Math.round(reun * 0.20) : 0;
    });

    return {
      reunioes:   { hist2025: hist.reunioes,   real2026: reunioes2026, proj2026: projReun },
      fechamentos:{ hist2025: hist.fechamentos, real2026: fechamentos2026, proj2026: projFech },
      mesAtual,
    };
  },

  _projetar(dados, mesAtual) {
    const soma = dados.slice(0, mesAtual + 1).reduce((a, b) => a + b, 0);
    const media = soma / (mesAtual + 1);
    return dados.map((v, i) => (i <= mesAtual ? v : Math.round(media)));
  },
};

/* ====================================================================
   CHARTS — gestão dos gráficos Chart.js
==================================================================== */
const Charts = {
  instancias: {},

  COR_2025_LINHA:    'rgba(79, 127, 153, 0.9)',
  COR_2026_LINHA:    'rgba(139, 195, 74, 0.9)',
  COR_PROJ_LINHA:    'rgba(139, 195, 74, 0.4)',
  COR_2025_FILL:     'rgba(79, 127, 153, 0.15)',
  COR_2026_FILL:     'rgba(139, 195, 74, 0.12)',

  defaultOptions(mesAtual) {
    return {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 600 },
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: {
          ticks: {
            font: { family: 'Montserrat', size: 8, weight: '600' },
            color: 'rgba(255,255,255,0.4)',
            maxRotation: 0,
          },
          grid: { color: 'rgba(255,255,255,0.05)' },
          border: { color: 'rgba(255,255,255,0.1)' },
        },
        y: {
          ticks: {
            font: { family: 'Montserrat', size: 8 },
            color: 'rgba(255,255,255,0.4)',
            maxTicksLimit: 5,
            stepSize: 1,
          },
          grid: { color: 'rgba(255,255,255,0.05)' },
          border: { color: 'rgba(255,255,255,0.1)' },
          beginAtZero: true,
        },
      },
    };
  },

  /* Exibe apenas 6 meses: Fev(1) a Jul(6) */
  CHART_INICIO: 1,
  CHART_FIM:    7,

  renderizar(dados) {
    const { reunioes, fechamentos, mesAtual } = dados;
    const s = this.CHART_INICIO, e = this.CHART_FIM;
    const meses6 = Utils.MESES.slice(s, e);
    const slice  = obj => ({ hist2025: obj.hist2025.slice(s,e), real2026: obj.real2026.slice(s,e), proj2026: obj.proj2026.slice(s,e) });

    this._renderGrafico('chart-reunioes',    meses6, slice(reunioes),    mesAtual, 'legenda-reunioes');
    this._renderGrafico('chart-fechamentos', meses6, slice(fechamentos), mesAtual, 'legenda-fechamentos');
  },

  _renderGrafico(canvasId, meses, dados, mesAtual, legendaId) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;

    const datasets = [
      {
        label: '2025',
        data: dados.hist2025,
        borderColor: this.COR_2025_LINHA,
        backgroundColor: this.COR_2025_FILL,
        borderWidth: 2,
        pointRadius: 2,
        fill: false,
        tension: 0.3,
      },
      {
        label: '2026 Real',
        data: dados.real2026,
        borderColor: this.COR_2026_LINHA,
        backgroundColor: this.COR_2026_FILL,
        borderWidth: 2,
        pointRadius: 2,
        fill: false,
        tension: 0.3,
      },
      {
        label: '2026 Proj.',
        data: dados.proj2026,
        borderColor: this.COR_PROJ_LINHA,
        backgroundColor: 'transparent',
        borderWidth: 1.5,
        borderDash: [5, 4],
        pointRadius: 0,
        fill: false,
        tension: 0.3,
      },
    ];

    if (this.instancias[canvasId]) {
      const chart = this.instancias[canvasId];
      chart.data.datasets = datasets;
      chart.update('none');
    } else {
      this.instancias[canvasId] = new Chart(canvas, {
        type: 'line',
        data: { labels: meses, datasets },
        options: this.defaultOptions(mesAtual),
      });
    }

    /* Legenda manual */
    const legendaEl = document.getElementById(legendaId);
    if (legendaEl) {
      legendaEl.innerHTML = [
        { cor: this.COR_2025_LINHA, label: '2025' },
        { cor: this.COR_2026_LINHA, label: '2026 Real' },
        { cor: this.COR_PROJ_LINHA, label: '2026 Proj.', dashed: true },
      ].map(l => `
        <div class="legenda-item">
          <div class="legenda-dot" style="background:${l.cor}; ${l.dashed ? 'border-top:2px dashed '+l.cor+';background:transparent;' : ''}"></div>
          ${l.label}
        </div>
      `).join('');
    }
  },
};

/* ====================================================================
   ESTADO DE ULTRAPASSAGEM
   Guarda posições anteriores para detectar mudanças
==================================================================== */
const UltrapassagemState = {
  posAnteriorEDN:  {}, // { vendedorId: posição 1-based }
  posAnteriorExec: {},
  alertasAtivos:   {}, // { vendedorId: timeoutId }

  atualizar(rankEDNs, rankExecs) {
    const novasPosEDN  = {};
    const novasPosExec = {};

    rankEDNs.forEach((s, i)  => novasPosEDN[s.vendedor.id]  = i + 1);
    rankExecs.forEach((s, i) => novasPosExec[s.vendedor.id] = i + 1);

    const mudancas = {};

    Object.entries(novasPosEDN).forEach(([id, novaPos]) => {
      const anteriorPos = this.posAnteriorEDN[id];
      if (anteriorPos && anteriorPos > novaPos) {
        mudancas[id] = anteriorPos - novaPos; // quantas posições subiu
      }
    });

    this.posAnteriorEDN  = novasPosEDN;
    this.posAnteriorExec = novasPosExec;
    return mudancas;
  },
};

/* ====================================================================
   RENDERERS — funções de renderização de cada quadrante
==================================================================== */
const Renderers = {

  /* --- Q1: RANKING ------------------------------------------------ */
  q1() {
    const rankEDNs  = RankingEngine.rankingEDNs();
    const rankExecs = RankingEngine.rankingExecutivos();
    const mudancas  = UltrapassagemState.atualizar(rankEDNs, rankExecs);

    this._renderRankingEDNs(rankEDNs, mudancas);
    this._renderRankingExecs(rankExecs);
  },

  _renderRankingEDNs(ranking, mudancas) {
    const container = document.getElementById('ranking-edns');
    if (!container) return;

    const maxVal = ranking.length ? ranking[0].reunioesRealizadas : 1;

    if (!ranking.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>Nenhum EDN cadastrado</div>';
      return;
    }

    // Calcula posições reais com empates
    const _posEDN = [];
    ranking.slice(0, 7).forEach((s, i) => {
      if (i === 0) { _posEDN.push(1); return; }
      const prev = ranking[i-1];
      const mesmoVal = s.reunioesRealizadas === prev.reunioesRealizadas;
      const mesmoFech = s.participouFechamento === prev.participouFechamento;
      _posEDN.push(mesmoVal && mesmoFech ? _posEDN[i-1] : i + 1);
    });

    container.innerHTML = ranking.slice(0, 7).map((s, i) => {
      const pos    = _posEDN[i];
      const classe = pos === 1 ? 'ouro' : pos === 2 ? 'prata' : pos === 3 ? 'bronze' : 'normal';
      const medal  = pos === 1 ? '🥇'  : pos === 2 ? '🥈'   : pos === 3 ? '🥉'     : null;
      const pct    = maxVal > 0 ? Math.round((s.reunioesRealizadas / maxVal) * 100) : 0;
      const up     = mudancas[s.vendedor.id];
      const avatarHTML = s.vendedor.foto
        ? `<div class="avatar"><img src="${s.vendedor.foto}" alt=""></div>`
        : `<div class="avatar">${Utils.iniciais(s.vendedor.nome + ' ' + s.vendedor.sobrenome)}</div>`;

      return `
        <div class="pessoa-row ${classe}">
          ${medal ? `<span class="medal-badge">${medal}</span>` : `<span class="pos-num">${i+1}</span>`}
          ${avatarHTML}
          <div class="pessoa-info">
            <div class="pessoa-nome">${s.vendedor.nome} ${s.vendedor.sobrenome}</div>
            <div class="pessoa-sub">${s.reunioesRealizadas} reuniões</div>
          </div>
          <div class="progress-wrap">
            <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="pessoa-valor">${s.reunioesRealizadas}</div>
          ${up ? `<div class="up-badge">↑${up}</div>` : ''}
        </div>
      `;
    }).join('');

    /* Remove badges de ultrapassagem após 30s */
    if (Object.keys(mudancas).length) {
      setTimeout(() => Renderers.q1(), 30000);
    }
  },

  _renderRankingExecs(ranking) {
    const container = document.getElementById('ranking-execs');
    if (!container) return;

    if (!ranking.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div>Nenhum Executivo cadastrado</div>';
      return;
    }

    // Calcula posições reais com empates
    const _posExec = [];
    ranking.slice(0, 6).forEach((s, i) => {
      if (i === 0) { _posExec.push(1); return; }
      const prev = ranking[i-1];
      const mesmo = s.totalReceita === prev.totalReceita && s.fechamentos === prev.fechamentos;
      _posExec.push(mesmo ? _posExec[i-1] : i + 1);
    });

    container.innerHTML = ranking.slice(0, 6).map((s, i) => {
      const pos    = _posExec[i];
      const classe = pos === 1 ? 'destaque-exec' : 'normal';
      const medal  = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : null;
      const avatarHTML = s.vendedor.foto
        ? `<div class="avatar"><img src="${s.vendedor.foto}" alt=""></div>`
        : `<div class="avatar">${Utils.iniciais(s.vendedor.nome + ' ' + s.vendedor.sobrenome)}</div>`;

      return `
        <div class="pessoa-row ${classe}">
          ${medal ? `<span class="medal-badge">${medal}</span>` : `<span class="pos-num">${i+1}</span>`}
          ${avatarHTML}
          <div class="pessoa-info">
            <div class="pessoa-nome">${s.vendedor.nome} ${s.vendedor.sobrenome}</div>
            <div class="pessoa-sub">${s.fechamentos} fech. · ${Utils.formataMoeda(s.totalReceita)}</div>
          </div>
          <div class="pessoa-valor" style="font-size:10px;min-width:60px">${Utils.formataMoeda(s.totalReceita)}</div>
        </div>
      `;
    }).join('');
  },

  /* --- Q2: FUNIL DE VENDAS — só gráficos (fechamentos estão no Q3) */
  q2() {
    const dados = RankingEngine.dadosGrafico();
    Charts.renderizar(dados);
  },

  /* --- Q3: DESTAQUES + FECHAMENTOS -------------------------------- */
  q3() {
    /* -- Destaques do mês anterior -- */
    const d = DataService.getDestaquesAnterior();
    const container = document.getElementById('destaques-container');
    const titulo = document.getElementById('destaques-titulo');
    if (!container) return;

    if (d.mes) titulo.textContent = `Destaques — ${d.mes}`;

    const cards = [
      { key: 'reunioes',    icone: '🤝', categoria: 'Mais Reuniões',    labelSufixo: 'Reuniões'    },
      { key: 'fechamentos', icone: '🏆', categoria: 'Mais Fechamentos', labelSufixo: 'Fechamentos' },
      { key: 'receita',     icone: '💰', categoria: 'Maior Receita',    labelSufixo: '',            isMoeda: true },
    ];

    if (!d.reunioes && !d.fechamentos && !d.receita) {
      container.innerHTML = `<div class="empty-state" style="width:100%;height:100%"><div class="empty-icon">🏅</div>Destaques a definir no Admin</div>`;
    } else {
      container.innerHTML = cards.map(c => {
        const info = d[c.key];
        if (!info) return `
          <div class="destaque-row glass">
            <div class="dest-icone">${c.icone}</div>
            <div class="dest-categoria">${c.categoria}</div>
            <div class="dest-nome" style="color:rgba(255,255,255,0.35)">A definir</div>
          </div>`;
        const iniciais = Utils.iniciais(info.nome || '?');
        /* Sem duplicidade: número e label juntos, tudo verde e mesmo tamanho */
        const valorFmt = c.isMoeda
          ? Utils.formataMoeda(info.valor)
          : `${info.valor} ${c.labelSufixo}`;
        return `
          <div class="destaque-row glass glass-green">
            <div class="dest-icone">${c.icone}</div>
            <div class="dest-categoria">${c.categoria}</div>
            <div class="dest-avatar">${iniciais}</div>
            <div class="dest-nome">${info.nome || '—'}</div>
            <div class="dest-valor">${valorFmt}</div>
          </div>`;
      }).join('');
    }

    /* -- Últimos fechamentos do mês (movidos do Q2) -- */
    const fechContainer = document.getElementById('lista-fechamentos');
    if (!fechContainer) return;

    const ultimosFechamentos = DataService.getUltimosFechamentos() || [];

    if (!ultimosFechamentos.length) {
      fechContainer.innerHTML = '<div class="empty-state" style="width:100%"><div class="empty-icon">🤝</div>Nenhum fechamento registrado este mês</div>';
      return;
    }

    fechContainer.innerHTML = ultimosFechamentos.slice(0, 5).map(f => `
      <div class="fechamento-card glass">
        <div class="fech-cliente">${f.cliente || '—'}</div>
        <div class="fech-exec">✦ ${f.executivo || '—'}</div>
        <div class="fech-valor">${Utils.formataMoeda(f.valor || 0)}</div>
        <div class="fech-local" style="font-size:11px; color:var(--text-muted); margin-top:4px;">${f.data || '—'}</div>
      </div>
    `).join('');

    /* Badge de totais: usa TODOS os fechamentos do mês atual (eventos), não só os cards */
    const totaisBadge = document.getElementById('fech-totais-badge');
    if (totaisBadge) {
      const mesAtualStr = new Date().toISOString().slice(0, 7);
      const todosFechMes = DataService.getFechamentos().filter(e => e.data && e.data.startsWith(mesAtualStr));
      const totalFat = todosFechMes.reduce((s, e) => s + (e.valorGestao || 0), 0);
      totaisBadge.textContent = `${todosFechMes.length} fech. · ${Utils.formataMoeda(totalFat)}`;
    }
  },

  /* --- Q4: META DO MÊS ------------------------------------------ */
  q4() {
    const metas    = DataService.getMetas();
    const stats    = RankingEngine.calcularEstatisticas();
    const edns     = stats.filter(s =>  (s.vendedor.perfil === 'EDN'       || s.vendedor.perfil === 'Ambos'));
    const execs    = stats.filter(s => (s.vendedor.perfil === 'Executivo' || s.vendedor.perfil === 'Ambos') && !s.vendedor.ocultarTelao);

    this._renderMetaPanel('meta-edns', 'rodape-edns', edns,
      s => s.reunioesRealizadas, metas.reunioesPorEDN, 'reuniões');

    this._renderMetaPanel('meta-execs', 'rodape-execs', execs,
      s => s.fechamentos, metas.fechamentosPorExecutivo, 'fechamentos',
      s => s.totalReceita);
  },

  _renderMetaPanel(listId, rodapeId, stats, metricFn, metaValor, label, receitaFn = null) {
    const container = document.getElementById(listId);
    const rodape    = document.getElementById(rodapeId);
    if (!container) return;

    if (!stats.length) {
      container.innerHTML = '<div class="empty-state"><div class="empty-icon">👤</div>Sem membros cadastrados</div>';
      if (rodape) rodape.textContent = '';
      return;
    }

    /* Ordena por desempenho (maior primeiro), empate por nome */
    const sorted = [...stats].sort((a, b) =>
      metricFn(b) - metricFn(a) || a.vendedor.nome.localeCompare(b.vendedor.nome)
    );

    let totalRealizado = 0;
    const totalMeta = stats.length * metaValor;

    container.innerHTML = sorted.map(s => {
      const val  = metricFn(s);
      totalRealizado += val;
      const pct  = metaValor > 0 ? Math.min(100, Math.round((val / metaValor) * 100)) : 0;
      const ok   = val >= metaValor;
      const nome = s.vendedor.nome + (s.vendedor.sobrenome ? ' ' + s.vendedor.sobrenome : '');
      return `
        <div class="meta-pessoa-row ${ok ? 'batida' : 'nao-batida'}">
          <div class="meta-pessoa-info">
            <div class="meta-pessoa-header">
              <div class="meta-pessoa-nome">${nome}</div>
              <div class="meta-pessoa-contagem">${val}<span class="meta-sep"> | </span><span class="meta-goal">${metaValor}</span></div>
            </div>
            <div class="meta-mini-track">
              <div class="meta-mini-fill ${ok ? 'ok' : 'parcial'}" style="width:${pct}%"></div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    if (rodape) {
      rodape.textContent = `Total: ${totalRealizado} | Meta: ${totalMeta} ${label}`;
    }
  },
};
